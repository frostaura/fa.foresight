services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foresight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-foresight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foresight} -d ${POSTGRES_DB:-foresight}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./src/backend/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-foresight};Username=${POSTGRES_USER:-foresight};Password=${POSTGRES_PASSWORD}
      Sandbox__BaseUrl: http://sandbox:8000
      KeyVault__PrivateKey: ${KeyVault__PrivateKey:-}
      Polymarket__LiveTrading: ${Polymarket__LiveTrading:-false}
      Polymarket__ApiKey: ${Polymarket__ApiKey:-}
      Polymarket__ApiSecret: ${Polymarket__ApiSecret:-}
      Polymarket__ApiPassphrase: ${Polymarket__ApiPassphrase:-}
      Polymarket__WalletAddress: ${Polymarket__WalletAddress:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8088}
      # Telegram bot — outbound notifications + the inbound /start /connect command listener.
      # Only ONE instance may poll the bot (a second gets 409 Conflict). PROD owns the command
      # listener, so it defaults OFF locally. Outbound notifications + the live-chart deep-link
      # still work with it off. Token + admin chat id come from .env.
      TelegramBot__Token: ${TelegramBot__Token:-}
      TelegramBot__NotifyChatId: ${TelegramBot__NotifyChatId:-}
      TelegramBot__DefaultTenantSlug: ${TelegramBot__DefaultTenantSlug:-dean}
      Telegram__EnableCommandListener: ${Telegram__EnableCommandListener:-false}
      Foresight__PublicUrl: ${Foresight__PublicUrl:-}
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://127.0.0.1:5000/health >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_started
    networks:
      - default
      - sandbox_internal

  frontend:
    build:
      context: .
      dockerfile: ./src/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Sandbox sidecar — Python execution service for deterministic code nodes.
  # Network-isolated: placed on an internal-only bridge with no gateway so
  # container processes cannot reach the internet. The backend reaches it via
  # the shared internal network; it has no access to public routes.
  # ---------------------------------------------------------------------------
  sandbox:
    build:
      context: ./src/sandbox
      dockerfile: Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 64
    user: "1001:1001"
    networks:
      - sandbox_internal
    environment:
      SANDBOX_ENV: ${SANDBOX_ENV:-production}

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8088}:80"
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_BACKEND_PORT: ${NGINX_BACKEND_PORT:-5000}
      NGINX_FRONTEND_PORT: ${NGINX_FRONTEND_PORT:-80}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-10m}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

networks:
  default:
    driver: bridge
  # Internal-only network for the sandbox — no gateway, no internet egress.
  # backend joins both networks; sandbox joins only this one.
  sandbox_internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
