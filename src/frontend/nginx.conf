server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # SSE + slow-LLM support. Without buffering off, nginx accumulates the upstream
    # response in its own buffers, so per-event SSE frames (text/event-stream) never
    # reach the browser in real time — every prediction/paper card hangs on "Thinking…"
    # because the `created`/`resolved` events are held back. HTTP/1.1 + empty Connection
    # keeps the upstream stream open. The long read/send timeouts cover cold-start LLM
    # ensemble calls (/api/live/predict, /predictions/backfill) that exceed nginx's 60s
    # default and were returning 504s, which in turn aborted queued requests like
    # /api/favorites.
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
