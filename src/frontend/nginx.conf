server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Pure static SPA server. API / SSE routing is owned by the gateway reverse proxy
  # (nginx/nginx.conf), which routes /api and /sse to the backend and everything else
  # here — so this container never proxies the API itself (doing so previously crashed
  # nginx on an unresolvable "api" upstream).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
