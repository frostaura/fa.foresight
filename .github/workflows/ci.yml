name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint → build → test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore fa.foresight.slnx
      - name: Lint (format)
        run: dotnet format fa.foresight.slnx --verify-no-changes --no-restore
      - name: Build
        run: dotnet build fa.foresight.slnx -c Release --no-restore
      - name: Test
        run: dotnet test fa.foresight.slnx -c Release --no-build

  frontend:
    name: Frontend (lint → build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
